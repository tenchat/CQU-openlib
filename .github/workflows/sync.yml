name: Upstream Sync

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间上午 8:00 执行 (UTC 0:00)
  workflow_dispatch:    # 允许手动点击按钮触发同步

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    name: Sync latest commits from upstream repo

    steps:
    # 第一步：检出你的仓库
    - name: Checkout target repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 第二步：同步上游操作
    - name: Sync upstream changes
      id: sync
      uses: aieri/sync-upstream-repo@v1.3.0
      with:
        upstream_repo: "https://github.com/INFO-studio/CQU-openlib.git"
        upstream_branch: "main"
        target_branch: "main"
        force: false # 如果你没有在 fork 分支上提交代码，设为 false 即可

    # 第三步：检查同步结果
    - name: Check for new commits
      if: steps.sync.outputs.has_new_commits == 'true'
      run: echo "New commits were found and synced."

    - name: No new commits
      if: steps.sync.outputs.has_new_commits == 'false'
      run: echo "No new commits found."
